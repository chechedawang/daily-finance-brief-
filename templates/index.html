<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端视口：让网页在手机上以合适的宽度显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- iOS Safari 全屏模式支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>每日财经快报</title>

    <!-- 外部样式表 -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- ======== 顶部导航栏 ======== -->
    <header class="header">
        <div class="header-inner">
            <div>
                <div class="header-title">
                    <span class="icon">📰</span>每日财经快报
                </div>
                <div class="header-date" id="headerDate">加载中...</div>
            </div>
            <button class="refresh-btn" id="refreshBtn" onclick="loadNews(true)" title="刷新">
                ↻
            </button>
        </div>
    </header>

    <!-- ======== 主内容区 ======== -->
    <main class="main">

        <!-- 状态栏 -->
        <div class="stats-bar" id="statsBar" style="display:none;">
            <span>📊 共 <span class="count" id="newsCount">0</span> 条新闻</span>
            <span class="stats-dot" id="statsDot"></span>
            <span id="statsText" style="font-size:12px;"></span>
        </div>

        <!-- 搜索 + 筛选 -->
        <div class="toolbar" id="toolbar" style="display:none;">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="search" id="searchInput" placeholder="搜索标题、来源、内容…" oninput="renderNews()">
            </div>
            <div class="filter-chips" id="filterChips">
                <!-- JS 动态生成 -->
            </div>
        </div>

        <!-- 新闻列表容器 -->
        <div class="news-list" id="newsList">
            <!-- 初始加载中 → 骨架屏 -->
            <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
            </div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            每日财经快报 · 数据来自公开 RSS 源 · <span id="cacheTime"></span>
        </div>
    </main>

    <!-- 外部脚本 -->
    <script src="/static/app.js"></script>
</body>
</html>
