<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端视口：让网页在手机上以合适的宽度显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- iOS Safari 全屏模式支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>每日财经快报</title>

    <style>
        /* ==========================================
           CSS 变量 - 全局配色方案（改颜色只需改这里）
           ========================================== */
        :root {
            --bg: #f0f3f7;
            --card-bg: #ffffff;
            --text-primary: #1a1d2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --header-bg-start: #0f172a;
            --header-bg-end: #1e293b;
            --accent: #3b82f6;
            --accent-light: #eff6ff;
            --divider: #e5e7eb;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        /* ==========================================
           全局重置
           ========================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                         'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* 防止 iOS 橡皮筋效果导致的误触 */
            overscroll-behavior-y: contain;
        }

        /* ==========================================
           顶部 Header
           ========================================== */
        .header {
            background: linear-gradient(135deg, var(--header-bg-start), var(--header-bg-end));
            color: #fff;
            padding: 20px 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.3);
        }

        .header-inner {
            max-width: 640px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-title .icon {
            margin-right: 6px;
        }

        .header-date {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .refresh-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .refresh-btn:active {
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(90deg);
        }

        .refresh-btn.spinning {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ==========================================
           主内容区
           ========================================== */
        .main {
            max-width: 640px;
            margin: 0 auto;
            padding: 0 12px 80px;
        }

        /* ==========================================
           状态栏（新闻数量 + 来源状态）
           ========================================== */
        .stats-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            margin: 12px 4px 0;
            background: var(--card-bg);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            font-size: 13px;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .stats-bar .count {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 16px;
        }

        .stats-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }

        .stats-dot.error {
            background: #f59e0b;
        }

        .stats-dot.offline {
            background: #ef4444;
        }

        /* ==========================================
           搜索框 + 分类筛选
           ========================================== */
        .toolbar {
            padding: 12px 4px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1.5px solid var(--divider);
            border-radius: var(--radius-md);
            font-size: 14px;
            background: var(--card-bg);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .filter-chips::-webkit-scrollbar {
            display: none;
        }

        .chip {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            border: 1.5px solid var(--divider);
            background: var(--card-bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            user-select: none;
        }

        .chip:active {
            transform: scale(0.95);
        }

        .chip.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .chip .count {
            margin-left: 4px;
            font-size: 11px;
            opacity: 0.8;
        }

        /* ==========================================
           新闻卡片
           ========================================== */
        .news-list {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            border: 1.5px solid transparent;
            /* 点击动画 */
            -webkit-tap-highlight-color: transparent;
        }

        .news-card:active {
            transform: scale(0.985);
            border-color: var(--divider);
        }

        .news-card:hover {
            box-shadow: var(--shadow-md);
        }

        /* 卡片顶行：来源 + 分类 + 时间 */
        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .source-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.3px;
        }

        .category-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        /* 英文源标签样式 */
        .lang-en .category-tag {
            background: #fef3c7;
            color: #92400e;
        }

        /* 中文科技类标签 */
        .cat-tech .category-tag {
            background: #d1fae5;
            color: #065f46;
        }

        /* 中文市场类标签 */
        .cat-market .category-tag {
            background: #dbeafe;
            color: #1e40af;
        }
        /* 中文宏观类标签 */
        .cat-macro .category-tag {
            background: #fef3c7;
            color: #92400e;
        }
        /* 半导体 */
        .cat-semi .category-tag {
            background: #cffafe;
            color: #155e75;
        }
        /* 财经快讯 */
        .cat-flash .category-tag {
            background: #fee2e2;
            color: #991b1b;
            font-weight: 600;
        }
        /* 全球市场 */
        .cat-global-market .category-tag {
            background: #ede9fe;
            color: #5b21b6;
        }

        .card-time {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.5;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-link-hint {
            font-size: 11px;
            color: var(--accent);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ==========================================
           骨架屏（加载中）
           ========================================== */
        .skeleton-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
        }

        .skeleton-line {
            height: 12px;
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .skeleton-line.short { width: 40%; }
        .skeleton-line.medium { width: 70%; }
        .skeleton-line.long { width: 90%; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ==========================================
           状态提示（加载失败 / 空数据）
           ========================================== */
        .state-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .state-message .emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .state-message .text {
            font-size: 15px;
            margin-bottom: 8px;
        }

        .state-message .sub {
            font-size: 13px;
        }

        /* ==========================================
           底部
           ========================================== */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 12px;
        }

        /* ==========================================
           响应式调整（大屏设备）
           ========================================== */
        @media (min-width: 768px) {
            .header-title {
                font-size: 24px;
            }
            .news-card {
                padding: 18px 20px;
            }
            .card-title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ======== 顶部导航栏 ======== -->
    <header class="header">
        <div class="header-inner">
            <div>
                <div class="header-title">
                    <span class="icon">📰</span>每日财经快报
                </div>
                <div class="header-date" id="headerDate">加载中...</div>
            </div>
            <button class="refresh-btn" id="refreshBtn" onclick="loadNews(true)" title="刷新">
                ↻
            </button>
        </div>
    </header>

    <!-- ======== 主内容区 ======== -->
    <main class="main">

        <!-- 状态栏 -->
        <div class="stats-bar" id="statsBar" style="display:none;">
            <span>📊 共 <span class="count" id="newsCount">0</span> 条新闻</span>
            <span class="stats-dot" id="statsDot"></span>
            <span id="statsText" style="font-size:12px;"></span>
        </div>

        <!-- 搜索 + 筛选 -->
        <div class="toolbar" id="toolbar" style="display:none;">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="search" id="searchInput" placeholder="搜索标题、来源、内容…" oninput="renderNews()">
            </div>
            <div class="filter-chips" id="filterChips">
                <!-- JS 动态生成 -->
            </div>
        </div>

        <!-- 新闻列表容器 -->
        <div class="news-list" id="newsList">
            <!-- 初始加载中 → 骨架屏 -->
            <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
            </div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            每日财经快报 · 数据来自公开 RSS 源 · <span id="cacheTime"></span>
        </div>
    </main>

    <!-- ==========================================
         JavaScript 逻辑
         ========================================== -->
    <script>
        // ========== 全局状态 ==========
        let allArticles = [];        // 所有新闻
        let sourcesInfo = [];        // 来源状态信息
        let currentFilter = 'all';   // 当前分类筛选
        let isLoading = false;

        // ========== 页面加载时自动获取新闻 ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadNews(false);
        });

        // ========== 获取新闻数据 ==========
        async function loadNews(forceRefresh) {
            if (isLoading) return;
            isLoading = true;

            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.classList.add('spinning');

            try {
                const endpoint = forceRefresh ? '/api/refresh' : '/api/news';
                const resp = await fetch(endpoint);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                const data = await resp.json();

                // 更新全局状态
                allArticles = data.articles || [];
                sourcesInfo = data.sources || [];

                // 更新 UI
                updateHeader(data.date);
                updateStats(data.total, data.sources);
                buildFilterChips();
                renderNews();
                document.getElementById('cacheTime').textContent =
                    `数据更新于 ${data.cached_at}`;

                // 显示之前隐藏的元素
                document.getElementById('statsBar').style.display = 'flex';
                document.getElementById('toolbar').style.display = 'flex';

            } catch (err) {
                console.error('获取新闻失败:', err);
                document.getElementById('newsList').innerHTML = `
                    <div class="state-message">
                        <div class="emoji">😵</div>
                        <div class="text">新闻加载失败</div>
                        <div class="sub">请检查网络连接后点击右上角刷新按钮重试</div>
                    </div>`;
            } finally {
                isLoading = false;
                refreshBtn.classList.remove('spinning');
            }
        }

        // ========== 更新顶部日期 ==========
        function updateHeader(dateStr) {
            document.getElementById('headerDate').textContent = dateStr || '';
        }

        // ========== 更新状态栏 ==========
        function updateStats(total, sources) {
            document.getElementById('newsCount').textContent = total;

            const okCount = sources.filter(s => !s.error).length;
            const errCount = sources.filter(s => s.error).length;
            const totalSources = sources.length;

            const dot = document.getElementById('statsDot');
            dot.className = 'stats-dot';
            if (errCount === totalSources) {
                dot.classList.add('offline');
            } else if (errCount > 0) {
                dot.classList.add('error');
            }

            document.getElementById('statsText').textContent =
                `${okCount}/${totalSources} 个来源正常`;
        }

        // ========== 构建分类筛选按钮 ==========
        function buildFilterChips() {
            // 统计每个分类的文章数
            const catCount = {};
            allArticles.forEach(a => {
                const cat = a.category || '其他';
                catCount[cat] = (catCount[cat] || 0) + 1;
            });

            // 生成 chip 按钮
            let html = `<span class="chip active" data-filter="all" onclick="setFilter('all', this)">
                全部<span class="count">${allArticles.length}</span>
            </span>`;

            for (const [cat, count] of Object.entries(catCount)) {
                html += `<span class="chip" data-filter="${cat}" onclick="setFilter('${cat}', this)">
                    ${cat}<span class="count">${count}</span>
                </span>`;
            }

            document.getElementById('filterChips').innerHTML = html;
        }

        // ========== 切换分类筛选 ==========
        function setFilter(filter, el) {
            currentFilter = filter;
            // 更新 chip 高亮
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderNews();
        }

        // ========== 渲染新闻列表 ==========
        function renderNews() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const container = document.getElementById('newsList');

            // 筛选逻辑
            let filtered = allArticles;

            // 分类筛选
            if (currentFilter !== 'all') {
                filtered = filtered.filter(a => a.category === currentFilter);
            }

            // 关键词搜索（标题 + 来源 + 摘要）
            if (searchTerm) {
                filtered = filtered.filter(a =>
                    a.title.toLowerCase().includes(searchTerm) ||
                    a.source.toLowerCase().includes(searchTerm) ||
                    a.summary.toLowerCase().includes(searchTerm)
                );
            }

            // 空状态
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="state-message">
                        <div class="emoji">📭</div>
                        <div class="text">${searchTerm ? '没有匹配的新闻' : '暂无新闻'}</div>
                        <div class="sub">${searchTerm ? '试试其他关键词？' : '请点击右上角刷新按钮获取最新新闻'}</div>
                    </div>`;
                return;
            }

            // 渲染卡片
            container.innerHTML = filtered.map(article => {
                // 分类决定卡片的额外 CSS 类
                let extraClass = '';
                const cat = article.category || '';
                if (cat.includes('快讯') || cat.includes('财经')) {
                    extraClass = 'cat-flash';
                } else if (cat.includes('科技') || cat.includes('Tech') || cat.includes('半导体') || cat.includes('AI') || cat.includes('数字')) {
                    extraClass = 'cat-tech';
                } else if (cat.includes('市场') || cat.includes('A股') || cat.includes('全球')) {
                    extraClass = 'cat-global-market';
                } else if (cat.includes('宏观')) {
                    extraClass = 'cat-macro';
                }

                if (article.lang === 'en') {
                    extraClass += ' lang-en';
                }

                return `
                <div class="news-card ${extraClass}" onclick="openArticle('${escapeHtml(article.link)}')">
                    <div class="card-meta">
                        <span class="source-badge" style="background:${article.color || '#3b82f6'}">
                            ${escapeHtml(article.source)}
                        </span>
                        <span class="category-tag">${escapeHtml(article.category || '综合')}</span>
                        <span class="card-time">${escapeHtml(article.time || '')}</span>
                    </div>
                    <div class="card-title">${escapeHtml(article.title)}</div>
                    ${article.summary ? `<div class="card-summary">${escapeHtml(article.summary)}</div>` : ''}
                    <div class="card-link-hint">
                        📎 阅读原文
                    </div>
                </div>`;
            }).join('');
        }

        // ========== 打开原文链接 ==========
        function openArticle(url) {
            if (!url) return;
            window.open(url, '_blank');
        }

        // ========== HTML 转义（防 XSS） ==========
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ========== 下拉刷新（移动端） ==========
        let touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchmove', e => {
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const touchY = e.touches[0].clientY;
            // 在顶部下拉超过 60px 触发刷新
            if (scrollTop <= 0 && touchY - touchStartY > 60) {
                loadNews(true);
            }
        }, { passive: true });
    </script>
</body>
</html>
